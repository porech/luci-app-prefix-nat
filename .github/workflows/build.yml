name: Build and Publish Package

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ipk
        run: |
          PKG_NAME="luci-app-prefix-nat"
          PKG_VERSION="1.0.0"
          PKG_RELEASE=$(git rev-list --count HEAD)
          PKG_ARCH="all"
          PKG_FULL="${PKG_NAME}_${PKG_VERSION}-${PKG_RELEASE}_${PKG_ARCH}"

          # Create control file
          mkdir -p build/control build/data
          cat > build/control/control <<EOF
          Package: ${PKG_NAME}
          Version: ${PKG_VERSION}-${PKG_RELEASE}
          Depends: luci-base
          Source: https://github.com/porech/luci-app-prefix-nat
          SourceName: ${PKG_NAME}
          License: MIT
          Section: luci
          SourceDateEpoch: $(date +%s)
          Maintainer: Alessandro Rinaldi
          Architecture: ${PKG_ARCH}
          Installed-Size: $(find root htdocs -type f 2>/dev/null | xargs wc -c | tail -1 | awk '{print $1}')
          Description: LuCI support for 1:1 Prefix NAT
           Provides a LuCI interface to configure nftables 1:1 prefix NAT rules
           for subnet-to-subnet translation, compatible with firewall4.
          EOF
          # Trim leading spaces from heredoc
          sed -i 's/^          //' build/control/control

          cat > build/control/conffiles <<EOF
          /etc/config/prefix-nat
          EOF
          sed -i 's/^          //' build/control/conffiles

          cat > build/control/postinst <<'POSTINST'
          #!/bin/sh
          [ -z "${IPKG_INSTROOT}" ] && {
            /etc/init.d/rpcd restart
            /etc/init.d/prefix-nat enable
          }
          exit 0
          POSTINST
          sed -i 's/^          //' build/control/postinst
          chmod +x build/control/postinst

          # Copy files
          cp -r root/* build/data/ 2>/dev/null || true
          mkdir -p build/data/www
          cp -r htdocs/* build/data/www/ 2>/dev/null || true

          # Build ipk (tar of tar.gz files)
          cd build/control && tar czf ../control.tar.gz . && cd ../..
          cd build/data && tar czf ../data.tar.gz . && cd ../..
          echo "2.0" > build/debian-binary
          cd build && tar cf "../${PKG_FULL}.ipk" ./debian-binary ./control.tar.gz ./data.tar.gz && cd ..

          echo "PKG_FULL=${PKG_FULL}" >> "$GITHUB_ENV"
          echo "Built: ${PKG_FULL}.ipk ($(stat -c %s "${PKG_FULL}.ipk") bytes)"

      - name: Generate repository
        env:
          USIGN_SEC_KEY: ${{ secrets.USIGN_SEC_KEY }}
          USIGN_PUB_KEY: ${{ secrets.USIGN_PUB_KEY }}
        run: |
          mkdir -p repo

          # Copy ipk
          cp ${PKG_FULL}.ipk repo/

          # Generate Packages index
          cd repo
          for ipk in *.ipk; do
            [ -f "$ipk" ] || continue
            tar -xOf "$ipk" ./control.tar.gz | tar xzf - --to-stdout ./control
            echo "Filename: $ipk"
            echo "Size: $(stat -c %s "$ipk")"
            echo "SHA256sum: $(sha256sum "$ipk" | cut -d' ' -f1)"
            echo ""
          done > Packages
          gzip -9c Packages > Packages.gz

          # Sign if key is available
          if [ -n "$USIGN_SEC_KEY" ]; then
            # Install usign
            sudo apt-get -qq install -y cmake git gcc libc6-dev >/dev/null 2>&1
            git clone -q https://git.openwrt.org/project/usign.git /tmp/usign-src
            cd /tmp/usign-src && cmake -DCMAKE_BUILD_TYPE=Release . >/dev/null && make -s && sudo cp usign /usr/local/bin/
            cd "$GITHUB_WORKSPACE/repo"

            echo "$USIGN_SEC_KEY" > /tmp/usign.sec
            usign -S -m Packages -s /tmp/usign.sec
            rm -f /tmp/usign.sec
            echo "Packages signed"
          fi

          # Write public key
          if [ -n "$USIGN_PUB_KEY" ]; then
            echo "$USIGN_PUB_KEY" > prefix-nat-repo.pub
          fi

          cd ..

          # Create index.html for the repo
          cat > repo/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html><head><title>luci-app-prefix-nat repository</title></head>
          <body>
          <h1>luci-app-prefix-nat OpenWRT package repository</h1>
          <p>Add this feed to your OpenWRT router:</p>
          <pre>
          # Add signing key
          KEY_ID=$(wget -qO- https://porech.github.io/luci-app-prefix-nat/prefix-nat-repo.pub | usign -F -p /dev/stdin)
          wget -qO /etc/opkg/keys/$KEY_ID https://porech.github.io/luci-app-prefix-nat/prefix-nat-repo.pub

          # Add feed
          echo "src/gz prefix-nat https://porech.github.io/luci-app-prefix-nat" >> /etc/opkg/customfeeds.conf

          # Install
          opkg update
          opkg install luci-app-prefix-nat
          </pre>
          </body></html>
          HTMLEOF
          sed -i 's/^          //' repo/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
